server {
    listen 80;
    listen [::]:80;
    server_name powerpolysupplies.com www.powerpolysupplies.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name powerpolysupplies.com www.powerpolysupplies.com;

    ssl_certificate /etc/letsencrypt/live/powerpolysupplies.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/powerpolysupplies.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; img-src 'self' https: data: blob:; script-src 'self' https://www.google.com https://www.gstatic.com https://web.squarecdn.com; style-src 'self' 'unsafe-inline' https:; connect-src 'self' https: wss:; frame-src 'self' https://www.google.com https://web.squarecdn.com; form-action 'self' https://checkout.square.site https://connect.squareup.com; upgrade-insecure-requests" always;

    root /var/www/powerpolysupplies/frontend;
    index index.html;
    autoindex off;

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
        access_log off;
        log_not_found off;
    }
}
